version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: medical_consultation_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Mit@1724
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    # This command ensures migrations run before starting the server
    command: sh -c "python manage.py migrate && python setup_test_data.py && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app  # Syncs local code changes to the container
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=medical_consultation_db
      - DB_USER=postgres
      - DB_PASSWORD=Mit@1724
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents local node_modules from overwriting container ones
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true # Fixes hot-reloading issues on some OS
    depends_on:
      - backend

volumes:
  postgres_data: